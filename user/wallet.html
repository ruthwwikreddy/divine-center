<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>Wallet — Divine Center</title>
  <script src="../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="../portal.css"/>
  <link rel="stylesheet" href="../demo-mode.css"/>
</head>
<body class="page-portal page-portal--pandit " data-portal-layout="pandit" data-portal-active="wallet" data-dash-layout="pandit" data-dash-active="wallet">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <div class="portal-pandit-wallet" id="pandit-wallet-root">
          <section class="portal-wallet-balance" aria-label="Available balance">
            <div class="portal-wallet-balance__main">
              <p class="portal-wallet-balance__label">Available balance</p>
              <p class="portal-wallet-balance__amount">₹24,500</p>
              <p class="portal-wallet-balance__hint">Available for withdrawal after ritual completion</p>
            </div>
            <div class="portal-wallet-balance__actions">
              <a href="withdrawals" class="dash-btn dash-btn--accent portal-wallet-balance__btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                Withdraw
              </a>
              <a href="payout-details" class="dash-btn dash-btn--outline portal-wallet-balance__btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                Bank details
              </a>
            </div>
          </section>

          <div class="dash-stats portal-pandit-wallet-stats" id="pandit-wallet-stats" aria-label="Wallet overview"></div>

          <section class="dash-card portal-wallet-credits-hub" aria-labelledby="wallet-credits-title">
            <header class="portal-wallet-credits-hub__head">
              <div class="portal-wallet-credits-hub__head-main">
                <span class="portal-wallet-credits-hub__head-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                </span>
                <div>
                  <h2 class="dash-card__title" id="wallet-credits-title">Recent credits</h2>
                  <p class="dash-card__sub">Earnings from completed rituals</p>
                </div>
              </div>
              <a href="bookings" class="dash-btn dash-btn--outline portal-wallet-credits-hub__link">All bookings</a>
            </header>
            <div class="portal-wallet-credits-hub__toolbar">
              <div class="portal-wallet-credits-hub__filters" id="wallet-credits-filters" role="tablist" aria-label="Filter credits">
                <button type="button" class="portal-wallet-credits-hub__filter is-active" role="tab" aria-selected="true" data-wallet-credit-filter="all">All</button>
                <button type="button" class="portal-wallet-credits-hub__filter" role="tab" aria-selected="false" data-wallet-credit-filter="2026">2026</button>
                <button type="button" class="portal-wallet-credits-hub__filter" role="tab" aria-selected="false" data-wallet-credit-filter="2025">2025</button>
              </div>
              <p class="portal-wallet-credits-hub__count" id="wallet-credits-count" aria-live="polite"></p>
              <p class="portal-wallet-credits-hub__total" id="wallet-credits-total" aria-live="polite"></p>
            </div>
            <div class="portal-wallet-credits-list" id="pandit-wallet-credits" role="list" aria-label="Recent wallet credits"></div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <script src="../user/wallet.js"></script>
  <script src="../demo-session.js"></script>
  <script src="../portal-shell.js"></script>
  <script src="../portal-polish.js"></script>
  <script src="../layout.js"></script>
  <script src="../demo-mode.js"></script>
</body>
</html>
