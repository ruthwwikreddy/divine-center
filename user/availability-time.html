<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>Availability — Divine Center</title>
  <script src="../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="../portal.css"/>
  <link rel="stylesheet" href="../demo-mode.css"/>
</head>
<body class="page-portal page-portal--pandit " data-portal-layout="pandit" data-portal-active="availability-time" data-dash-layout="pandit" data-dash-active="availability-time">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <section class="dash-card portal-availability" aria-labelledby="availability-title">
          <div class="portal-availability__grid">
            <div class="portal-availability__main">
              <header class="portal-availability-main__head">
                <div class="portal-availability-main__head-text">
                  <h2 class="dash-card__title" id="availability-title">Weekly schedule</h2>
                  <p class="dash-card__sub">Set when devotees can request your rituals</p>
                </div>
                <div class="portal-availability-main__filters" id="availability-view-filters" role="tablist" aria-label="Filter days">
                  <button type="button" class="portal-availability-main__filter is-active" role="tab" aria-selected="true" data-availability-view="all">All days</button>
                  <button type="button" class="portal-availability-main__filter" role="tab" aria-selected="false" data-availability-view="open">Open only</button>
                </div>
              </header>
              <form id="availability-form" class="portal-availability__form" data-demo-allow="true" novalidate>
                <div class="portal-availability-cards" id="availability-days-list" role="list" aria-live="polite"></div>
                <p id="availability-save-note" class="portal-availability__note" role="status" hidden></p>
                <footer class="portal-availability__foot">
                  <button type="submit" class="dash-btn dash-btn--accent">Save availability</button>
                  <span class="portal-availability__foot-note">Changes apply to future booking requests</span>
                </footer>
              </form>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="../user/availability.js"></script>
  <script src="../demo-session.js"></script>
  <script src="../portal-shell.js"></script>
  <script src="../portal-polish.js"></script>
  <script src="../layout.js"></script>
  <script src="../demo-mode.js"></script>
</body>
</html>
