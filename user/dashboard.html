<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>Dashboard — Divine Center</title>
  <script src="../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="../portal.css"/>
  <link rel="stylesheet" href="../demo-mode.css"/>
</head>
<body class="page-portal page-portal--pandit portal-page--pandit-dashboard" data-portal-layout="pandit" data-portal-active="dashboard" data-dash-layout="pandit" data-dash-active="dashboard">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <div class="portal-pandit-dash" id="pandit-dash-root">
          <div class="portal-welcome portal-welcome--pandit" id="pandit-dash-welcome">
            <div>
              <p class="portal-welcome__text">Namaste, <span id="pandit-welcome-name">Panduranga</span></p>
              <p class="portal-welcome__sub">4 pending requests</p>
            </div>
            <div class="portal-quick">
              <a class="portal-quick__btn" href="bookings">Bookings</a>
              <a class="portal-quick__btn" href="availability-time">Availability</a>
              <a class="portal-quick__btn" href="wallet">Wallet</a>
            </div>
          </div>

          <div class="dash-stats portal-pandit-stats" id="pandit-dash-stats" aria-label="Pandit overview"></div>

          <section class="dash-card portal-pandit-actions" aria-labelledby="pandit-actions-title">
            <header class="portal-pandit-actions__head">
              <div class="portal-pandit-actions__head-main">
                <span class="portal-pandit-actions__head-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
                </span>
                <div>
                  <h2 class="dash-card__title" id="pandit-actions-title">Quick actions</h2>
                  <p class="dash-card__sub">Manage bookings, schedule, and earnings</p>
                </div>
              </div>
              <a href="bookings" class="dash-btn dash-btn--outline portal-pandit-actions__all">All bookings</a>
            </header>
            <div class="portal-pandit-actions__grid" id="pandit-actions-grid" role="list"></div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <script src="../user/dashboard.js"></script>
  <script src="../demo-session.js"></script>
  <script src="../portal-shell.js"></script>
  <script src="../portal-polish.js"></script>
  <script src="../layout.js"></script>
  <script src="../demo-mode.js"></script>
</body>
</html>
