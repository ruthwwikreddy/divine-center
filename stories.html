<!DOCTYPE html>
<html data-demo-site="true" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Watch client stories and social highlights from Divine Center — real families, rituals, and moments of grace." />
    <title>Client Stories — Divine Center</title>
    <script src="site-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="demo-mode.css" />
  </head>
  <body class="page-stories" data-page="stories">
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="site-nav"></div>

    <main id="main">
      <section class="stories-page" aria-labelledby="stories-page-title">
        <div class="wrap">
          <header class="section-head section-head--center stories-page__head">
            <div class="section-head__titles">
              <p class="eyebrow eyebrow--decor">
                <span class="eyebrow__flourish" aria-hidden="true"></span>
                Stories in motion
                <span class="eyebrow__flourish" aria-hidden="true"></span>
              </p>
              <h1 id="stories-page-title" class="section-title">Client stories &amp; social highlights</h1>
              <p class="home-section__lede home-section__lede--center">Tap the sound icon on any reel to listen. Each story plays through before moving to the next.</p>
            </div>
          </header>

          <div class="stories-grid" data-stories-grid aria-label="All client story reels">
            <div class="stories-grid__track"></div>
          </div>

          <div class="home-section__actions stories-page__actions">
            <a href="contact" class="btn btn--outline">Share your story →</a>
            <a href="https://www.instagram.com/divinecenter_official/reels/" class="btn btn--accent" target="_blank" rel="noopener noreferrer">Follow on Instagram →</a>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="stories-reels.js"></script>
    <script src="demo-session.js"></script>
    <script src="layout.js"></script>
    <script src="demo-mode.js"></script>
  </body>
</html>
