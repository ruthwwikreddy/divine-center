<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdf8f2" />
    <meta name="description" content="Book authentic Vedic puja services on Divine Center." />
    <title>Puja Service — Divine Center</title>
    <script src="site-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="mobile.css" />
    <link rel="stylesheet" href="puja-detail-base.css" />
    <link rel="stylesheet" href="puja-detail-mobile.css" />
  </head>
  <body class="m-app m-app--with-sticky" data-page="pujas" data-tabbar="off">
    <main class="m-page m-page--detail puja-detail" id="puja-detail"></main>
    <footer class="m-sticky-bar m-sticky-bar--puja" id="puja-bar" hidden>
      <div>
        <span class="m-sticky-bar__label">Get quote</span>
        <strong class="m-sticky-bar__price" id="puja-price">Personalized for you</strong>
        <span class="m-sticky-bar__meta" id="puja-sticky-meta">Verified pandit • Book online</span>
      </div>
      <a href="#" class="btn btn--accent" id="book-btn">Get quote</a>
    </footer>
    <script src="puja-details-data.js"></script>
    <script src="pandit-details-data.js"></script>
    <script src="site-data.js"></script>
    <script src="../booking-sidebar.js"></script>
    <script src="puja.js"></script>
    <script src="mobile-shell.js"></script>
    <script>
      (function () {
        var root = document.getElementById("puja-detail");
        if (!root) return;

        function enhance() {
          var article = root.querySelector(".puja-detail-page");
          if (!article) return;
          if (article.dataset.enhanced) return;
          article.dataset.enhanced = "1";

          function shareCurrentPage() {
            var shareData = { title: document.title, url: location.href };
            if (navigator.share) {
              navigator.share(shareData).catch(function () {});
              return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(location.href).catch(function () {
                window.prompt("Copy link", location.href);
              });
              return;
            }
            window.prompt("Copy link", location.href);
          }

          var heroBody = article.querySelector(".puja-hero__body");
          if (heroBody) {
            heroBody.insertAdjacentHTML(
              "beforeend",
              '<section class="puja-prep" aria-label="Booking prep">' +
              '<div class="puja-prep__head">' +
              '<h2 class="puja-prep__title">Choose schedule</h2>' +
              '<p class="puja-prep__sub">Pick when you want the ritual performed</p>' +
              "</div>" +
              '<div class="puja-prep__days" id="puja-schedule-days" role="listbox" aria-label="Schedule options">' +
              '<button type="button" class="puja-prep__day is-active" role="option" aria-selected="true" data-day="Today">' +
              '<span class="puja-prep__day-label">Today</span><span class="puja-prep__day-hint">Fastest slot</span></button>' +
              '<button type="button" class="puja-prep__day" role="option" aria-selected="false" data-day="Tomorrow">' +
              '<span class="puja-prep__day-label">Tomorrow</span><span class="puja-prep__day-hint">High availability</span></button>' +
              '<button type="button" class="puja-prep__day" role="option" aria-selected="false" data-day="Pick date">' +
              '<span class="puja-prep__day-label">Pick date</span><span class="puja-prep__day-hint">Flexible muhurat</span></button>' +
              "</div>" +
              '<div class="puja-prep__status" id="puja-schedule-status">' +
              '<span class="puja-prep__status-dot" aria-hidden="true"></span>' +
              '<p id="puja-schedule-status-text"><strong>Today</strong> · Slots available · Confirmed at checkout</p>' +
              "</div>" +
              '<div class="puja-prep__address">' +
              '<span class="puja-prep__address-icon" aria-hidden="true">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-4.5 7-11a7 7 0 10-14 0c0 6.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>' +
              "</span>" +
              "<span>Home service area confirmed at checkout</span>" +
              "</div>" +
              "</section>"
            );
            heroBody.insertAdjacentHTML(
              "beforeend",
              '<section class="m-puja-trustbar" aria-label="Trust highlights"><div class="m-puja-trustbar__item"><strong>Verified pandit</strong><span>background checked by Divine Center</span></div><div class="m-puja-trustbar__item"><strong>Custom quote</strong><span>personalized pricing after we understand your needs</span></div></section>'
            );
          }

          article.querySelectorAll(".puja-article, .puja-panel").forEach(function (sec) {
            if (sec.closest(".puja-hero__body")) return;
            if (sec.classList.contains("puja-samagri") || sec.dataset.skipAccordion === "true") return;
            if (sec.querySelector("details")) return;
            var title = sec.querySelector(".puja-article__title, .puja-panel__title");
            if (!title) return;
            var t = title.textContent;
            var body = "";
            Array.prototype.slice.call(sec.children).forEach(function (el) {
              if (el === title) return;
              body += el.outerHTML;
            });
            sec.innerHTML = '<details><summary>' + t + '</summary><div class="m-accordion-body">' + body + "</div></details>";
          });
          function updatePujaScheduleStatus(selected) {
            var statusText = document.getElementById("puja-schedule-status-text");
            if (statusText) {
              if (selected === "Pick date") {
                statusText.innerHTML =
                  "<strong>Pick date</strong> · Select at checkout · Pandit confirms muhurat";
              } else {
                statusText.innerHTML =
                  "<strong>" +
                  selected +
                  "</strong> · Slots available · Confirmed at checkout";
              }
            }
            var stickyMeta = document.getElementById("puja-sticky-meta");
            if (stickyMeta) {
              stickyMeta.textContent =
                selected === "Pick date"
                  ? "Flexible date · Pandit confirms muhurat"
                  : selected + " slots · Verified pandit on-time";
            }
          }

          var scheduleDays = article.querySelector("#puja-schedule-days");
          if (scheduleDays) {
            scheduleDays.querySelectorAll(".puja-prep__day").forEach(function (chip) {
              chip.addEventListener("click", function () {
                scheduleDays.querySelectorAll(".puja-prep__day").forEach(function (c) {
                  c.classList.remove("is-active");
                  c.setAttribute("aria-selected", "false");
                });
                chip.classList.add("is-active");
                chip.setAttribute("aria-selected", "true");
                updatePujaScheduleStatus(chip.getAttribute("data-day") || "Today");
              });
            });
          }

          var shareBtn = article.querySelector(".puja-hero__share");
          if (shareBtn && !shareBtn.dataset.bound) {
            shareBtn.dataset.bound = "1";
            shareBtn.addEventListener("click", shareCurrentPage);
          }
        }

        setTimeout(enhance, 50);
        setTimeout(enhance, 250);
      })();
    </script>
  </body>
</html>
