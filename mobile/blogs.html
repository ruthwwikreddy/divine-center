<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdf8f2" />
    <meta name="description" content="Spiritual insights and puja guides from Divine Center." />
    <title>Blogs — Divine Center</title>
    <script src="site-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body class="m-app" data-page="blogs">
    <header class="m-subheader">
      <button type="button" class="m-header__menu m-subheader__menu" id="m-menu-btn" aria-label="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <h1 class="m-subheader__title">Blogs</h1>
      <button type="button" class="m-subheader__icon" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
      </button>
    </header>

    <main class="m-page m-page--blogs">
      <form class="m-search m-search--page m-blogs-search" role="search" id="m-blogs-search-form">
        <span class="search-pill__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        </span>
        <input type="search" id="m-blogs-search-input" class="search-pill__field" placeholder="Search spiritual blogs" autocomplete="off" />
      </form>

      <section class="m-blog-hero" id="m-blogs-hero" aria-label="Featured article"></section>

      <div class="m-blog-cats" id="m-blogs-categories" aria-label="Categories">
        <button type="button" class="m-blog-cat is-active" data-category="all">All</button>
        <button type="button" class="m-blog-cat" data-category="festivals">Festivals</button>
        <button type="button" class="m-blog-cat" data-category="rituals">Rituals</button>
        <button type="button" class="m-blog-cat" data-category="vratams">Vratams</button>
        <button type="button" class="m-blog-cat" data-category="traditions">Temple Traditions</button>
      </div>

      <section class="m-blog-section" aria-labelledby="m-latest-title">
        <h2 id="m-latest-title" class="m-section-label">Articles</h2>
        <div class="m-blog__list" id="m-blogs-latest"></div>
        <button type="button" class="btn btn--outline btn--block" id="m-blogs-load-more">Load more</button>
        <p class="m-empty" id="m-blogs-empty" hidden>No articles in this category.</p>
      </section>
    </main>

    <script src="blog-details-data.js"></script>
    <script src="site-data.js"></script>
    <script src="mobile-shell.js"></script>
    <script src="mobile-blogs.js"></script>
  </body>
</html>
