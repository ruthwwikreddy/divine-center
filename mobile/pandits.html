<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdf8f2" />
    <title>Pandits — Divine Center</title>
    <script src="site-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body class="m-app m-app--pandits" data-page="pandits">
    <header class="m-subheader">
      <a href="index" class="m-subheader__back" aria-label="Back">‹</a>
      <h1 class="m-subheader__title">Pandits</h1>
      <button type="button" class="m-subheader__icon" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
      </button>
    </header>

    <main class="m-main m-main--pandits">
      <section class="m-pandits-filter-wrap" aria-label="Search and filter pandits">
        <form class="pandits-filter pandits-filter--mobile" id="pandits-filter" role="search">
          <div class="pandits-filter__cell">
            <div class="pandits-filter__field">
              <span class="pandits-filter__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
              </span>
              <input type="search" name="name" id="filter-name" placeholder="Search pandit, ritual, city" autocomplete="off" />
            </div>
          </div>
          <div class="m-chips" id="pandit-filter-chips">
            <button type="button" class="m-chip is-active">Language</button>
            <button type="button" class="m-chip">Experience</button>
            <button type="button" class="m-chip">Ritual type</button>
            <button type="button" class="m-chip">Price</button>
            <button type="button" class="m-chip">Availability</button>
          </div>

          <div class="pandits-filter__grid">
            <div class="pandits-filter__cell">
              <label class="pandits-filter__label" for="filter-service">Ritual</label>
              <div class="pandits-filter__field">
                <select name="service" id="filter-service">
                  <option value="">All rituals</option>
                </select>
              </div>
            </div>
            <div class="pandits-filter__cell">
              <label class="pandits-filter__label" for="filter-city">City</label>
              <div class="pandits-filter__field">
                <select name="city" id="filter-city">
                  <option value="">Any city</option>
                </select>
              </div>
            </div>
            <div class="pandits-filter__cell">
              <label class="pandits-filter__label" for="filter-mode">Mode</label>
              <div class="pandits-filter__field">
                <select name="mode" id="filter-mode">
                  <option value="">Online / At place</option>
                  <option value="Online">Online</option>
                  <option value="place">At your place</option>
                  <option value="Both">Both</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn--accent pandits-filter__submit">Apply Filters</button>
          </div>
        </form>
      </section>

      <section class="m-pujas-sort" id="pandit-sort" aria-label="Sort pandits">
        <button class="m-pujas-sort__btn is-active" type="button">Top rated</button>
        <button class="m-pujas-sort__btn" type="button">Experience</button>
        <button class="m-pujas-sort__btn" type="button">Price</button>
      </section>

      <section class="m-pandits-list-wrap" aria-labelledby="m-pandits-list-title">
        <h2 id="m-pandits-list-title" class="visually-hidden">Pandit results</h2>
        <div class="pandits-directory__grid pandits-directory__grid--cards" id="pandits-list"></div>
        <p class="m-empty" id="pandits-empty" hidden>No pandits match your search.</p>
      </section>
    </main>

    <script src="site-data.js"></script>
    <script src="mobile-shell.js"></script>
    <script src="pandits.js"></script>
    <script>
      (function () {
        document.querySelectorAll("#pandit-filter-chips .m-chip").forEach(function (chip) {
          chip.addEventListener("click", function () {
            document.querySelectorAll("#pandit-filter-chips .m-chip").forEach(function (c) {
              c.classList.remove("is-active");
            });
            chip.classList.add("is-active");
          });
        });
        document.querySelectorAll("#pandit-sort .m-pujas-sort__btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll("#pandit-sort .m-pujas-sort__btn").forEach(function (b) {
              b.classList.remove("is-active");
            });
            btn.classList.add("is-active");
          });
        });
      })();
    </script>
  </body>
</html>
