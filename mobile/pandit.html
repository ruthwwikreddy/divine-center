<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdf8f2" />
    <meta name="description" content="View verified pandit profiles and book authentic Vedic rituals on Divine Center." />
    <title>Pandit Profile — Divine Center</title>
    <script src="site-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="mobile.css" />
    <link rel="stylesheet" href="puja-detail-base.css" />

  <body class="m-app m-app--with-sticky m-app--pandit-detail" data-page="pandits" data-tabbar="off">
    <main class="m-page m-page--detail m-page--pandit puja-detail" id="pandit-detail-root"></main>
    <footer class="m-sticky-bar m-sticky-bar--pandit" id="pandit-bar">
      <div class="pandit-sticky">
        <div class="pandit-sticky__top">
          <div class="pandit-sticky__copy">
            <span class="pandit-sticky__eyebrow">Book with confidence</span>
            <strong class="pandit-sticky__name" id="pandit-sticky-main">Verified Acharya</strong>
            <span class="pandit-sticky__meta" id="pandit-sticky-meta">Fast callback · Custom quote</span>
          </div>
          <div class="pandit-sticky__rating" aria-label="Pandit rating">
            <span class="pandit-sticky__rating-star" aria-hidden="true">★</span>
            <strong id="pandit-sticky-rating">4.7</strong>
          </div>
        </div>
        <div class="pandit-sticky__actions">
          <a href="tel:+919154900375" class="pandit-sticky__call" id="chat-btn" aria-label="Call Divine Center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            <span>Call</span>
          </a>
          <a href="contact.html" class="btn btn--accent pandit-sticky__book" id="book-btn">Book this pandit</a>
        </div>
      </div>
    </footer>
    <script src="pandit-details-data.js"></script>
    <script src="site-data.js"></script>
    <script src="pandit.js"></script>
    <script src="mobile-shell.js"></script>
  </body>
</html>
