<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>Change Password — Divine Center</title>
  <script src="../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="../portal.css"/>
  <link rel="stylesheet" href="../demo-mode.css"/>
</head>
<body class="page-portal page-portal--customer " data-portal-layout="customer" data-portal-active="settings" data-dash-layout="customer" data-dash-active="settings">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <a href="settings" class="dash-back-link portal-back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Settings
        </a>

        <section class="portal-password-page" aria-labelledby="password-form-title">
          <header class="portal-password-page__head">
            <span class="portal-password-page__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <div>
              <h1 class="portal-password-page__title" id="password-form-title">Change password</h1>
              <p class="portal-password-page__lede">Enter your current password, then set a new one</p>
            </div>
          </header>

          <form id="password-form" class="portal-password-form dash-card" data-demo-allow="true" novalidate>
            <div class="portal-password-form__fields">
              <div class="dash-field">
                <label for="password-current">Current password</label>
                <div class="portal-password-field">
                  <input type="password" id="password-current" name="current" autocomplete="current-password" placeholder="Current password" required/>
                  <button type="button" class="portal-password-field__toggle" data-toggle-password="password-current" aria-label="Show password" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>

              <div class="dash-field">
                <label for="password-new">New password</label>
                <div class="portal-password-field">
                  <input type="password" id="password-new" name="new" autocomplete="new-password" placeholder="At least 8 characters" minlength="8" required/>
                  <button type="button" class="portal-password-field__toggle" data-toggle-password="password-new" aria-label="Show password" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>

              <div class="dash-field">
                <label for="password-confirm">Confirm new password</label>
                <div class="portal-password-field">
                  <input type="password" id="password-confirm" name="confirm" autocomplete="new-password" placeholder="Re-enter new password" minlength="8" required/>
                  <button type="button" class="portal-password-field__toggle" data-toggle-password="password-confirm" aria-label="Show password" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
            </div>

            <ul class="portal-password-form__rules" id="password-requirements" aria-label="Password requirements">
              <li data-rule="length">At least 8 characters</li>
              <li data-rule="letter">Contains a letter</li>
              <li data-rule="number">Contains a number</li>
            </ul>

            <p id="password-save-note" class="portal-password-form__success" role="status" hidden></p>

            <div class="portal-password-form__foot">
              <button type="submit" class="dash-btn dash-btn--accent portal-password-form__submit">Update password</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>
  <script src="../customer/change-password.js"></script>
  <script src="../demo-session.js"></script>
  <script src="../portal-shell.js"></script>
  <script src="../portal-polish.js"></script>
  <script src="../layout.js"></script>
  <script src="../demo-mode.js"></script>
</body>
</html>
