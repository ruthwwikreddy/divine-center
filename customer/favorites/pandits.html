<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>Favorite Pandits — Divine Center</title>
  <script src="../../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles.css"/>
  <link rel="stylesheet" href="../../portal.css"/>
  <link rel="stylesheet" href="../../demo-mode.css"/>
</head>
<body class="page-portal page-portal--customer " data-portal-layout="customer" data-portal-active="favorites" data-dash-layout="customer" data-dash-active="favorites">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <a href="../favorites" class="dash-back-link portal-back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          All favorites
        </a>

        <section class="dash-card portal-fav-pandits-hub" aria-labelledby="fav-pandits-title">
          <header class="portal-fav-pandits-hub__head">
            <div class="portal-fav-pandits-hub__intro">
              <span class="portal-fav-pandits-hub__icon" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <div>
                <h2 class="dash-card__title" id="fav-pandits-title">Saved Acharyas</h2>
                <p class="dash-card__sub">Pandits from your bookings — rebook in one tap</p>
              </div>
            </div>
          </header>
          <div class="portal-fav-pandits-hub__toolbar">
            <div class="portal-fav-pandits-hub__filters" id="fav-pandits-filters" role="tablist" aria-label="Filter saved pandits">
              <button type="button" class="portal-fav-pandits-hub__filter is-active" role="tab" aria-selected="true" data-fav-filter="all">All</button>
              <button type="button" class="portal-fav-pandits-hub__filter" role="tab" aria-selected="false" data-fav-filter="offline">Offline</button>
              <button type="button" class="portal-fav-pandits-hub__filter" role="tab" aria-selected="false" data-fav-filter="both">Online &amp; offline</button>
            </div>
          </div>
          <div class="portal-fav-pandits-grid" id="dash-fav-track" role="list" aria-label="Favorite pandits"></div>
          <p class="portal-fav-pandits-empty is-hidden" id="fav-pandits-empty" role="status">No pandits match this filter.</p>
        </section>
      </div>
    </div>
  </main>
  <script src="../../site-data.js"></script>
  <script src="../../customer/favorites-list.js"></script>
  <script src="../../demo-session.js"></script>
  <script src="../../portal-shell.js"></script>
  <script src="../../portal-polish.js"></script>
  <script src="../../layout.js"></script>
  <script src="../../demo-mode.js"></script>
</body>
</html>
