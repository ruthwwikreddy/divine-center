<!DOCTYPE html>
<html data-demo-site="true" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#fdf8f2"/>
  <title>My Bookings — Divine Center</title>
  <script src="../site-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="../portal.css"/>
  <link rel="stylesheet" href="../demo-mode.css"/>
</head>
<body class="page-portal page-portal--customer portal-page--bookings" data-portal-layout="customer" data-portal-active="bookings" data-dash-layout="customer" data-dash-active="bookings">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-nav"></div>
  <main id="main">
    <div class="portal__shell">
      <aside id="portal-sidebar"></aside>
      <div class="portal-main">
        <section class="portal-hub-page portal-hub-page--bookings" aria-labelledby="bookings-page-title">
          <header class="portal-hub-page__head">
            <div>
              <h1 class="portal-hub-page__title" id="bookings-page-title">My bookings</h1>
              <p class="portal-hub-page__lede">Filter by status, search rituals, and open details</p>
            </div>
            <a href="../pandits/booking" class="dash-btn dash-btn--accent">Book new puja</a>
          </header>

          <div class="dash-card portal-hub-page__panel">
            <div class="portal-hub-page__toolbar">
              <div class="portal-hub-page__filters" id="dash-bookings-filters" role="tablist" aria-label="Filter bookings">
                <button type="button" class="portal-hub-page__filter is-active" role="tab" aria-selected="true" data-booking-filter="all">All</button>
                <button type="button" class="portal-hub-page__filter" role="tab" aria-selected="false" data-booking-filter="upcoming">Upcoming</button>
                <button type="button" class="portal-hub-page__filter" role="tab" aria-selected="false" data-booking-filter="pending">Pending</button>
                <button type="button" class="portal-hub-page__filter" role="tab" aria-selected="false" data-booking-filter="cancelled">Cancelled</button>
              </div>
              <label class="portal-hub-page__search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
                <span class="visually-hidden">Search bookings</span>
                <input type="search" id="dash-bookings-search" placeholder="Search ritual or pandit…" autocomplete="off"/>
              </label>
            </div>
            <p class="portal-hub-page__count" id="dash-bookings-count" aria-live="polite"></p>
            <div class="portal-record-list" id="dash-bookings-body" role="list" aria-label="All bookings"></div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="../booking-actions.js"></script>
  <script src="../customer/portal-customer-bookings.js"></script>
  <script src="../customer/bookings.js"></script>
  <script src="../demo-session.js"></script>
  <script src="../portal-shell.js"></script>
  <script src="../portal-polish.js"></script>
  <script src="../layout.js"></script>
  <script src="../demo-mode.js"></script>
</body>
</html>
